services:
  postgres:
    container_name: market_container
    image: postgres:17.5
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /data/postgres
    volumes:
      - database_backup:/data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
volumes:
  database_backup: