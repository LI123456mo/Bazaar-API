spring:
  application:
    name: market

  datasource:
    url: jdbc:postgresql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # =====  SPRING AI CONFIG =====
  ai:
    ollama:
      # ollama on PC
      # (Ollama always runs on port 11434 by default)
      base-url: http://localhost:11434

      chat:
        # llama3 = the brain that reads  code and answers questions
        model: llama3

      embedding:
        # nomic-embed-text = converts  Java files into vectors
        model: nomic-embed-text

    vectorstore:
      chroma:
        host: localhost
        port: 8000
        # The "folder" inside ChromaDB where  code vectors will be saved
        collection-name: bazaar-codebase
        #Tells ChromaDB to auto-create the storage bucket on first run
        initialize-schema: true


