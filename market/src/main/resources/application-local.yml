spring:
  application:
    name: market

  datasource:
    url: jdbc:postgresql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

        #SMTP
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  #SPRING AI CONFIG
  ai:
    openai:
      api-key: ${GROG_API}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.1-8b-instant

      # Keeps using Ollama JUST for embeddings (nomic-embed-text)
      # Groq doesn't do embeddings, only chat
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
