spring:
  application:
    name: bazaar-market

  profiles:
    active: local
  
  config:
    import: optional:file:.env[.properties]
  

  
  # ✅ ADD FILE UPLOAD CONFIG
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # ✅ ADD JACKSON CONFIG
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ✅ ADD LOGGING CONFIG
logging:
  level:
    root: INFO
    com.conel.market: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/bazaar.log
    max-size: 10MB
    max-history: 30

app:
  security:
    jwt:
      access-token-expiration:  86400000  #900000  15 minutes (not 24 hours!)
      refresh-token-expiration: 604800000 # 7 days
  
  # ADD EMAIL CONFIG
  email:
    verification-token-expiry: 24 # hours
    from: noreply@bazaar.local
    sender-name: Bazaar Platform
  
  # ADD FILE UPLOAD CONFIG
  file-storage:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-file-size: 10485760 # 10MB in bytes