spring:
  application:
    name: bazaar-market

  profiles:
    active: local
  
  config:
    import: optional:file:.env[.properties]
  

  
  # ADD FILE UPLOAD CONFIG
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # ADD JACKSON CONFIG
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # EMAIL CONFIGURATION — SMTP for sending emails
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}          # Gmail, SendGrid, Mailgun, etc.
    port: ${MAIL_PORT:587}                      # 587 for TLS, 465 for SSL
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ADD LOGGING CONFIG
logging:
  level:
    root: INFO
    com.conel.market: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/bazaar.log
    max-size: 10MB
    max-history: 30
app:
  security:
    jwt:
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000

  email:
    verification-token-expiry: 24
    from: ${MAIL_FROM:noreply@bazaar.local}
    sender-name: ${MAIL_SENDER_NAME:Bazaar Platform}
    verification-base-url: ${APP_VERIFICATION_BASE_URL:http://localhost:8080}

  file-storage:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-file-size: ${MAX_FILE_SIZE:10485760}

  rag:
    project-root: ${RAG_PROJECT_ROOT:${user.dir}}

  admin:
    email: ${ADMIN_EMAIL:conellimo@gmail.com}
    password: ${ADMIN_PASSWORD:conellimo}
    phone: ${ADMIN_PHONE:0000000000}
